name: skelar-chat-agent

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-skelar_chat_agent}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # Optional Postgres with pgvector built-in.
  # Start with: docker compose --profile pgvector up -d
  postgres_pgvector:
    profiles: ["pgvector"]
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-app}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-app}
      POSTGRES_DB: ${POSTGRES_DB:-skelar_chat_agent}
    ports:
      - "${PGVECTOR_POSTGRES_PORT:-5433}:5432"
    volumes:
      - postgres_pgvector_data:/var/lib/postgresql/data

volumes:
  redis_data:
  postgres_data:
  postgres_pgvector_data:
