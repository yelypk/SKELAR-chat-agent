intent_id: password_reset
title: Reset forgotten password
description: The user forgot their password or cannot sign in with email/password and needs to use the password reset flow.
symptoms:
  - I forgot my password.
  - I can’t log in because the password is wrong.
  - I don’t see any option to change my password in settings.
  - I clicked reset but I didn’t receive the email.
  - The password reset link doesn’t work / expired.
hidden_root_causes:
  - The account was created with Google sign-in, so there is no local password to reset.
  - Password reset email is delayed, filtered to spam, or blocked by the mailbox provider.
  - The user is entering a different email than the one used during sign-up (typo or alternate email).
required_questions:
  - Did you sign up using email/password or Google sign-in?
  - Which email address did you use to register (please confirm it exactly)?
  - Did you check Spam/Junk/Promotions folders for the reset email?
  - About how long ago did you request the reset email?
resolution_paths:
  - Guide the user to the Writer platform sign-in screen and choose “Forgot your password? Reset”, then enter the registration email.
  - Ask the user to check their email inbox (including spam/junk) for the password reset message.
  - If they used Google sign-in, instruct them to use the Google login method instead of resetting a password.
  - If the reset email does not arrive within a reasonable time, escalate to support for deliverability/account lookup (per Help Center guidance).
forbidden_actions:
  - Ask the user to send their current password or reset link contents.
  - Suggest unsafe “password recovery” methods outside the official reset flow.
  - Promise an immediate manual password change without verification.
escalation_rules:
  - Escalate if the user cannot receive the reset email after verifying the email address and checking spam/junk folders.
  - Escalate if the reset link repeatedly fails (expired/invalid) even after requesting a fresh email.
common_agent_mistakes:
  - ignored_question
  - incorrect_info
  - no_resolution
