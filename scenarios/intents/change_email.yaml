intent_id: change_email
title: Change account email address
description: The user wants to update the email associated with their AlphaNovel Writer account and complete the confirmation step.
symptoms:
  - I want to change my account email.
  - I updated the email but it didn’t change.
  - I didn’t get the confirmation email.
  - The system says I can’t change my email.
  - I signed up with Google and want to use a different email now.
hidden_root_causes:
  - The user registered via Google sign-in, so the platform does not allow changing the associated email address.
  - The confirmation email was not received (spam/delay) or the confirmation link expired.
  - The user entered an incorrect password when attempting to confirm the change.
required_questions:
  - How did you register/sign in (email/password or Google)?
  - Are you able to sign in successfully right now?
  - Did you receive the confirmation email for the change (and did you check spam/junk)?
  - Are you able to provide your current password when prompted?
resolution_paths:
  - Direct the user to the Profile page and follow the email change flow: initiate change, enter password, edit the current email, and save.
  - Remind the user to confirm the change via the confirmation email sent to their inbox.
  - If the account was created with Google sign-in, explain that the platform does not support changing the email in that case; advise continuing to use Google sign-in.
  - If confirmation email is missing, suggest checking spam/junk and requesting the change again; escalate if the email still does not arrive.
forbidden_actions:
  - Ask for the user’s password or request they share verification codes.
  - Claim you can change the email server-side without the confirmation step.
  - Recommend creating a new account as the primary workaround without discussing account ownership/continuity implications.
escalation_rules:
  - Escalate if the user is eligible (email/password registration) but cannot complete the change after retrying confirmation.
  - Escalate if the platform incorrectly blocks the change or confirmation emails consistently fail to arrive.
common_agent_mistakes:
  - incorrect_info
  - no_resolution
  - unnecessary_escalation
