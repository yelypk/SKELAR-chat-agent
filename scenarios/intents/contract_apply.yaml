intent_id: contract_apply
title: Apply for a contract
description: The user wants to submit their novel for a contract and needs to meet prerequisites and follow the in-platform application flow.
symptoms:
  - How can I apply for a contract?
  - I don’t see the Apply Contract button.
  - It says I need verification before applying.
  - I uploaded chapters but it still won’t let me apply.
  - How long does contract approval take?
hidden_root_causes:
  - The novel does not meet the minimum content requirement (less than 10,000 words published/uploaded).
  - Profile verification is not approved yet (pending or rejected), blocking contract submission.
  - The user’s content was flagged as not eligible (e.g., AI-generated writing) and will be rejected during review.
required_questions:
  - Is your Profile → Verification approved, pending, or rejected?
  - Approximately how many words have you uploaded for this novel (is it at least 10,000)?
  - Are you applying from the Novels section, and do you see any contract status on the book?
  - Which contract type are you applying for (Non-Exclusive, Exclusive, MAB Exclusive)?
resolution_paths:
  - Ensure prerequisites are met: create a novel, upload at least 10,000 words, and successfully complete profile Verification.
  - Once prerequisites are met, go to the Novels section and click “Apply Contract” for the book.
  - Set expectations for review timelines: Non-Exclusive and Regular Exclusive are typically reviewed within ~14 business days; MAB Exclusive can take up to ~1 month.
  - If approved, instruct the user to open the book entry, click “Ready to sign”, then “Sign Contract”; the contract becomes effective after both parties sign.
forbidden_actions:
  - Encourage the user to submit AI-written content as acceptable for contract approval.
  - Suggest skipping verification requirements or using someone else’s identity/payment credentials.
  - Promise approval outcomes or shorter timelines than stated.
escalation_rules:
  - Escalate if the Apply Contract button is missing despite verified profile and ≥10,000 words uploaded.
  - Escalate if the user receives contradictory contract eligibility messages or cannot access the signing flow after approval.
common_agent_mistakes:
  - incorrect_info
  - no_resolution
  - unnecessary_escalation
